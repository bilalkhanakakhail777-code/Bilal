<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Best Shoe Sites & Colors</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    h1 {
      text-align: center;
      color: #333;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      border-radius: 8px;
    }

    .card a {
      color: #1a73e8;
      text-decoration: none;
      font-weight: bold;
    }

    .colors {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .color-box {
      width: 60px;
      height: 60px;
      border-radius: 6px;
      border: 2px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: white;
      font-weight: bold;
      text-shadow: 1px 1px 2px #000;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Best Shoe Sites + Popular Colors</h1>

  <div class="card">
    <h2>🛍️ Best Shoe Websites</h2>
    <ul>
      <li><a href="https://www.shoezerland.com" target="_blank">ShoeZerLand</a></li>
      <li><a href="https://www.nike.com" target="_blank">Nike</a></li>
      <li><a href="https://www.adidas.com" target="_blank">Adidas</a></li>
      <li><a href="https://www.zappos.com" target="_blank">Zappos</a></li>
      <li><a href="https://www.royaltrend.pk" target="_blank">Royal Trend (Pakistan)</a></li>
    </ul>
  </div>

  <div class="card">
    <h2>🎨 Best Shoe Colors</h2>
    <div class="colors">
      <div class="color-box" style="background:#000000;">Black</div>
      <div class="color-box" style="background:#ffffff; color: #000;">White</div>
      <div class="color-box" style="background:#808080;">Grey</div>
      <div class="color-box" style="background:#8B4513;">Brown</div>
      <div class="color-box" style="background:#FF0000;">Red</div>
      <div class="color-box" style="background:#0000FF;">Blue</div>
      <div class="color-box" style="background:#F5F5DC; color: #000;">Beige</div>
      <div class="color-box" style="background:#800020;">Burgundy</div>
    </div>
  </div>

</div>

</body>
</html>
